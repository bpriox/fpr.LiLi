<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIOX</title>
    <style>
      body {
        margin: 0 auto;
        max-width: 900px;
        text-align: center;
        padding: 10px;
      }
      table {
  margin: 20px auto; /* بالا/پایین 20px و چپ/راست خودکار (همان وسط‌چینی) */
  border-collapse: collapse; /* (اختیاری) برای بهتر دیده شدن خطوط جدول */
  width: auto; /* یا هر عرض دلخواه مثل 80%، ولی اگر 100% باشد وسط نمی‌ماند! */
}
    </style>
  </head>
  <body>
    <h1>تمرین مرحله سوم</h1>
    <a href="#down" id="txt01">برو پایین صفحه</a>
    <hr />
    <h2>تمرین کردن انواع تگ های نوشتاری</h2>
    <q>تست تگ q </q>
    <br />
    <cite>تست تگ cite</cite>
    <br />
    <abbr> تست تگ abbr</abbr>
    <hr />
    <p>
      <strong>تمرین تگ لینک</strong>
    </p>
    <a href="http://www.google.com" target="_blank">
      <p>
        <strong>google search</strong>
      </p>
    </a>
    <p>تمرین جدول یا همان تیبل</p>

    <table border="1">
      <thead>
        <tr> <!-- ردیف هدر جدول -->
          <th colspan="3">تعرفه های codex RioX</th>
        </tr> <!-- پایان ردیف هدر -->
      </thead>
      <tbody>
        <tr> <!-- ردیف اول -->
          <td>150$</td>
          <td>با ادمین</td>
          <td rowspan="2">وبسایت کامل</td>
        </tr> <!-- پایان ردیف اول -->
        <tr> <!-- ردیف دوم -->
          <td>100$</td>
          <td>بدون ادمین</td>
        </tr> <!-- پایان ردیف دوم -->
        <tr> <!-- ردیف سوم -->
          <td>80$</td>
          <td>سفارشی</td>
          <td>فایل سایت</td>
        </tr> <!-- پایان ردیف سوم -->
      </tbody>
      <tfoot>
        <tr> <!-- ردیف فوتر -->
          <td>50$</td>
          <td>سفارشی</td>
          <td>دیزاین</td>
        </tr> <!-- پایان ردیف فوتر -->
      </tfoot>
    </table>

    <br />
    <a href="#txt01"><p id="down">برو بالای صفحه</p></a>
  </body>
</html>
